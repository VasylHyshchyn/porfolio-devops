services:
  
  backend:
    build: ./backend
    ports: 
      - "5000:5000"

    env_file: ./backend/.env

    depends_on:
      db:
        condition: service_healthy
    
    volumes:
      - ./backend:/app
      - /app/node_modules
  

  frontend:
    build: ./frontend
    ports: 
      - "5173:5173"

    volumes:
      - ./frontend:/app

  db: 
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "portfolio"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: